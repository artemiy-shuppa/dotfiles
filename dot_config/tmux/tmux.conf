# ============================================================================
# Color scheme (Catppuccin Mocha)
# ============================================================================
color_bg='#1e1e2e'
color_surface='#313244'
color_text='#cdd6f4'
color_subtext='#a6adc8'
color_muted='#6c7086'
color_accent='#cba6f7'
color_blue='#89b4fa'
color_green='#a6e3a1'
color_pink='#f5c2e7'
color_border='#45475a'
color_border_active='#89b4fa'
color_activity='#f9e2af'
color_bell='#f38ba8'

# ============================================================================
# Core settings
# ============================================================================
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set-option -g update-environment "DISPLAY WAYLAND_DISPLAY XDG_RUNTIME_DIR XDG_CURRENT_DESKTOP NIRI_SOCKET"
set -g mouse on
set -g history-limit 10000
set -sg escape-time 0
set -g focus-events on

# Window and pane indexing from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Prefix key
set -g prefix C-Space
bind C-Space send-prefix

# ============================================================================
# Status bar
# ============================================================================

set -g status-right-length 120
set -g status-left-length 80
set -g status-interval 1
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=$color_bg,fg=$color_text"

# Left: hostname, session name (accent color while prefix is held)
set -g status-left "\
#{?client_prefix,#[fg=$color_bg#,bg=$color_accent#,bold],#[fg=$color_blue#,bg=$color_bg#,bold]} #H \
#{?client_prefix,#[fg=$color_bg#,bg=$color_accent#,nobold],#[fg=$color_subtext#,bg=$color_bg#,nobold]} [#S] \
"

# Center: window list
set -g window-status-style "fg=$color_muted,bg=$color_bg"
set -g window-status-format ' #I:#W#F '

set -g window-status-current-style "fg=$color_blue,bg=$color_surface,bold,underscore"
set -g window-status-current-format ' #I:#W#F '

set -g window-status-activity-style "fg=$color_activity,bg=$color_bg"
set -g window-status-bell-style "fg=$color_bell,bg=$color_bg,bold"

# Right: keyboard layout, CPU, RAM, battery, time, date
set -g status-right "\
#{?client_prefix,#[fg=$color_bg#,bg=$color_accent],#[fg=$color_muted#,bg=$color_bg]}ο³€  #(~/.config/tmux/scripts/keyboard_layout.sh) \
#{?client_prefix,#[fg=$color_bg#,bg=$color_accent],#[fg=$color_text#,bg=$color_bg]} ο΄¦ #{cpu_percentage} \
#{?client_prefix,#[fg=$color_bg#,bg=$color_accent],#[fg=$color_subtext#,bg=$color_bg]} ο΅Ä #{ram_percentage} \
#{?client_prefix,#[fg=$color_bg#,bg=$color_accent],#[fg=$color_green#,bg=$color_bg]} #{battery_icon} #{battery_percentage} \
#{?client_prefix,#[fg=$color_bg#,bg=$color_accent],#[fg=$color_blue#,bg=$color_bg]} %H:%M \
#{?client_prefix,#[fg=$color_bg#,bg=$color_accent],#[fg=$color_pink#,bg=$color_bg]} %d %b "

# ============================================================================
# Plugins (TPM)
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Battery icons
set -g @batt_icon_charge_tier8 'σΑ²¹'
set -g @batt_icon_charge_tier7 'σΑ²Ä'
set -g @batt_icon_charge_tier6 'σΑ¹Ω'
set -g @batt_icon_charge_tier5 'σΑ¹Ψ'
set -g @batt_icon_charge_tier4 'σΑ¹Ϋ'
set -g @batt_icon_charge_tier3 'σΑ¹Φ'
set -g @batt_icon_charge_tier2 'σΑ¹Μ'
set -g @batt_icon_charge_tier1 'σΑ¹Κ'
set -g @batt_icon_status_charged 'σΑ²Ö'
set -g @batt_icon_status_charging 'σΑ²³'
set -g @batt_icon_status_discharging 'σΑ²É'
set -g @batt_icon_status_attached 'σΑ²É'
set -g @batt_icon_status_unknown 'σΑ²ë'

# ============================================================================
# Key bindings
# ============================================================================

bind r source-file ~/.config/tmux/tmux.conf \;

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation: Ctrl+Arrow (no prefix)
bind -n C-Left select-pane -L
bind -n C-Down select-pane -D
bind -n C-Up select-pane -U
bind -n C-Right select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation: Shift+Left/Right (no prefix)
bind -n S-Left previous-window
bind -n S-Right next-window

# Vi-style copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "~/.config/tmux/scripts/clipboard_copy.sh"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "~/.config/tmux/scripts/clipboard_copy.sh"

# Paste from system clipboard
bind ] run "~/.config/tmux/scripts/clipboard_paste.sh | tmux load-buffer - && tmux paste-buffer"

# Pane sync
bind S setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"

# ============================================================================
# Visual tweaks
# ============================================================================

set -g pane-border-style "fg=$color_border"
set -g pane-active-border-style "fg=$color_border_active"
set -g message-style "fg=$color_text,bg=$color_border,bold"
set -g message-command-style "fg=$color_text,bg=$color_border"

setw -g monitor-activity on
set -g visual-activity off

# ============================================================================
# TPM init (must be last!)
# ============================================================================
if "test ! -d ~/.config/tmux/plugins/tmux-sensible" \
   "run '~/.config/tmux/plugins/tpm/scripts/install_plugins.sh'"

run '~/.config/tmux/plugins/tpm/tpm'
